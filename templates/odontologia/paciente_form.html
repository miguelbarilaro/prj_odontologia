<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paciente</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-theme.css' %}" media="screen">

</head>
    <body>
    <div class="container">
            <form method="post" enctype="multipart/form-data" novalidate="">
                {% csrf_token %}
                <h2>Paciente</h2>
                <div class="col-sm-5 maincontent">
                    <div class="row">
                        <div class="col-xs-2">
                            {{ form.persona.label }} {{ form.persona }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.numeroHC.label }} {{ form.numeroHC }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.obrasocial.label }} {{ form.obrasocial }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.numeroOS.label }} {{ form.numeroOS }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.titularOS.label }} {{ form.titularOS }}
                        </div>
                    </div>
                    <input type="submit" name="submit" value="Grabar" class="btn btn-primary">
                </div>
            </form>
        </div>
    </body>
</html>
