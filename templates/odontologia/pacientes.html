<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de pacientes</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-theme.css' %}" media="screen">
    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}" >
</head>
    <body>
        <div id="wrapper" class="toggled">
            <header id="head" class="secondary"></header>
            <div class="container">
                <div class="row">
                    <article class="col-sm-8 maincontent">
                        <header class="page-header">
                            <h1>Consultorio Odontologico</h1>
                        </header>
                        <h3>Listado de Pacientes</h3>
                    </article>
                    <table class="table table-dark">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Hoja Clínica</th>
                                <th>Obra Social</th>
                                <th>MODIFICAR</th>
                                <th>ELIMINAR</th>
                            </tr>
                        </thead>
                        {% for paciente in pacientes %}
                            <tr>
                                <td>{{ paciente.persona }} </td>
                                <td>{{ paciente.numeroHC }} </td>
                                <td>{{ paciente.obrasocial }} </td>
                                <td><a href="{% url 'modificar_paciente' paciente.persona.num_doc %}"><img src="{% static 'img/editar.png' %}"></a> </td>
                                <td><a href="{% url 'eliminar_paciente' paciente.persona.num_doc %}" ><img src="{% static 'img/eliminar.png' %}"></a></td>
                            </tr>
                        {% endfor %}
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
