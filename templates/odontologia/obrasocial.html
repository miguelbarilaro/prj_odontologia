<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Listado de Obras Sociales</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-theme.css' %}" media="screen">
    <link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}" >
</head>
    <body>
        <div id="wrapper" class="toggled">
            <header id="head" class="secondary"></header>
            <div class="container">
                <div class="row">
                    <article class="col-sm-8 maincontent">
                        <header class="page-header">
                            <h1>Consultorio Odontologico</h1>
                        </header>
                        <h3>Listado de Obras Sociales</h3>
                    </article>
                    <table class="table table-dark">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Dirección</th>
                                <th>CUIT</th>
                                <th>MODIFICAR</th>
                                <th>ELIMINAR</th>
                            </tr>
                        </thead>
                        {% for obrasocial in obrassociales %}
                            <tr>
                                <td>{{ obrasocial.nombreOS }}</td>
                                <td>{{ obrasocial.direccion }}</td>
                                <td>{{ obrasocial.cuit }}</td>
                                <td><a href="{% url 'modificar_obrasocial' obrasocial.cuit %}" ><img src="{{ STATIC_URL }}static/img/editar.png"></a> </td>
                                <td><a href="{% url 'eliminar_obrasocial' obrasocial.cuit %}" ><img src="{% static 'img/eliminar.png' %}"></a></td>
                            </tr>
                        {% endfor %}
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
