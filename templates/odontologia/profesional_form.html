<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profesional</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap-theme.css' %}" media="screen">
</head>
    <body>
        <div class="container">
            <form method="post" enctype="multipart/form-data" novalidate="">
                {% csrf_token %}
                <h2>Profesional</h2>
                <div class="col-sm-5 maincontent">
                    <div class="row">
                        <div class="col-xs-2">
                            {{ form.profesional.label }} {{ form.profesional }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.matricula.label }} {{ form.matricula }}
                        </div>
                        <div class="col-xs-2">
                            {{ form.especialidad.label }} {{ form.especialidad }}
                        </div>
                    </div>
                    <input type="submit" name="submit" value="Grabar" class="btn btn-primary">
                </div>
            </form>
        </div>
    </body>
</html>
